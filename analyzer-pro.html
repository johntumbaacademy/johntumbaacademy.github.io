<!DOCTYPE html>
<html>
<head>
<title>Human Alignment Analyzer</title>

<!-- ✅ PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:#1c1c1c;
padding:30px;
border-radius:12px;
}

button{
padding:12px 20px;
margin:10px;
background:#ff4c4c;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
}

.hidden{
display:none;
}

.result{
margin-top:20px;
padding:20px;
background:#111;
border-radius:10px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h1>Human Alignment Analyzer™</h1>
<p>Answer honestly. Your pattern will be revealed.</p>

<!-- QUESTION 1 -->
<div id="q1">
<p>When someone pulls away, what do you do?</p>
<button onclick="answer('chase')">I chase and try harder</button>
<button onclick="answer('wait')">I wait and observe</button>
<button onclick="answer('react')">I react emotionally</button>
</div>

<!-- QUESTION 2 -->
<div id="q2" class="hidden">
<p>How do you handle slow replies?</p>
<button onclick="answer('overthink')">I overthink</button>
<button onclick="answer('match')">I match energy</button>
<button onclick="answer('double')">I double text</button>
</div>

<!-- QUESTION 3 -->
<div id="q3" class="hidden">
<p>Do you fear losing them?</p>
<button onclick="answer('yes')">Yes</button>
<button onclick="answer('no')">No</button>
</div>

<!-- RESULT -->
<div id="result" class="result hidden"></div>

</div>

<script>

let answers = [];
let finalResult = ""; // ✅ PDF STORAGE

function answer(value){

answers.push(value);

if(answers.length === 1){
document.getElementById("q1").classList.add("hidden");
document.getElementById("q2").classList.remove("hidden");
}

else if(answers.length === 2){
document.getElementById("q2").classList.add("hidden");
document.getElementById("q3").classList.remove("hidden");
}

else{
analyze();
}

}
let count = localStorage.getItem("analyzerCount") || 0;
count++;
localStorage.setItem("analyzerCount", count);
function analyze(){

let result = "";

if(answers.includes("chase") || answers.includes("double")){

result = `
<h2>Pattern: Over-Investment</h2>
<p><strong>Diagnosis:</strong> You give too much attention too early.</p>
<p><strong>Effect:</strong> This reduces perceived value and creates imbalance.</p>
<p><strong>Correction:</strong> Regulate attention. Stop chasing. Match energy.</p>
`;

finalResult = `
HUMAN ALIGNMENT REPORT

Pattern: Over-Investment

Meaning:
You give attention too early, reducing your perceived value.

Risk Level:
High — creates imbalance and weak positioning.

Fix:
Stop chasing. Match energy. Delay reactions.
`;

}

else if(answers.includes("overthink") || answers.includes("yes")){

result = `
<h2>Pattern: Emotional Reactivity</h2>
<p><strong>Diagnosis:</strong> You are controlled by emotional spikes.</p>
<p><strong>Effect:</strong> This creates instability and loss of control.</p>
<p><strong>Correction:</strong> Build emotional neutrality. Delay reactions.</p>
`;

finalResult = `
HUMAN ALIGNMENT REPORT

Pattern: Emotional Reactivity

Meaning:
You react emotionally instead of staying stable.

Risk Level:
Medium to High — leads to loss of control.

Fix:
Pause. Delay reactions. Stay neutral.
`;

}

else{

result = `
<h2>Pattern: Controlled Presence</h2>
<p><strong>Diagnosis:</strong> You maintain balance and awareness.</p>
<p><strong>Effect:</strong> This increases attraction and stability.</p>
<p><strong>Next Level:</strong> Learn advanced leverage control.</p>
`;

finalResult = `
HUMAN ALIGNMENT REPORT

Pattern: Controlled Presence

Meaning:
You maintain balance and emotional control.

Advantage:
High — strong attraction positioning.

Next Step:
Master deeper leverage systems.
`;

}

document.getElementById("q3").classList.add("hidden");

let resultBox = document.getElementById("result");

resultBox.innerHTML = result + `

<br><br>

<button onclick="downloadPDF()">Download Your Report</button>

<br><br>

<button onclick="window.location.href='checkout.html'">
Unlock Full Analysis
</button>

`;

resultBox.classList.remove("hidden");

}

function downloadPDF(){

const { jsPDF } = window.jspdf;

let doc = new jsPDF();

doc.setFontSize(16);
doc.text("Human Alignment Report", 20, 20);

doc.setFontSize(12);

let lines = doc.splitTextToSize(finalResult, 170);

doc.text(lines, 20, 40);

doc.save("Human_Alignment_Report.pdf");

}

</script>

</body>
</html>
