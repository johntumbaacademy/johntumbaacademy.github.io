<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard — Top Student Academy</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#03050d;
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

h1{
  text-align:center;
  margin-bottom:40px;
}

.module{
  background:#11172b;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.module.locked{
  opacity:0.4;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#ffce00;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  background:#555;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div class="container">

<h1>Hybrid Intelligence System</h1>

<div id="modules"></div>

</div>

<script>

const moduleList = [
"Learning Breakdown",
"Cognitive Control",
"Structured Thinking",
"AI Control",
"Execution System",
"Success Mapping",
"Performance Engine",
"Anti-Regression System",
"Advanced Hybrid Thinking",
"Mastery Layer",
"Bonus: Personal Optimization"
];

let progress = JSON.parse(localStorage.getItem("progress")) || 0;

const container = document.getElementById("modules");

function renderModules(){
  container.innerHTML = "";

  moduleList.forEach((mod,index)=>{
    const div = document.createElement("div");
    div.className = "module";

    if(index > progress){
      div.classList.add("locked");
    }

    const title = document.createElement("span");
    title.innerText = "Module " + (index+1) + " — " + mod;

    const btn = document.createElement("button");

    if(index === progress){
      btn.innerText = "Start";
      btn.onclick = ()=>{
        progress++;
        localStorage.setItem("progress",progress);
        renderModules();
      };
    } else if(index < progress){
      btn.innerText = "Completed";
      btn.disabled = true;
    } else {
      btn.innerText = "Locked";
      btn.disabled = true;
    }

    div.appendChild(title);
    div.appendChild(btn);
    container.appendChild(div);
  });
}

renderModules();

</script>

</body>
</html>
