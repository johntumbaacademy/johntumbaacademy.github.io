<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: #fff;
  padding: 20px;
}

h1 {
  text-align: center;
}

.box {
  background: #1c1c1c;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
}

.user {
  border: 1px solid #444;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>Admin Dashboard</h1>

<!-- 🔥 STATS -->
<div class="box">
<h2>Total Users</h2>
<p id="users">0</p>
</div>

<div class="box">
<h2>Analyzer Uses</h2>
<p id="analyzer">0</p>
</div>

<div class="box">
<h2>Emails Collected</h2>
<p id="emails">0</p>
</div>

<!-- 🔥 USER LIST -->
<div class="box">
<h2>User Data</h2>
<div id="user-list"></div>
</div>

<!-- ✅ MODERN FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "alignment-tsa-library.firebaseapp.com",
  projectId: "alignment-tsa-library",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔒 ADMIN EMAIL
const adminEmail = "tumbajohn12@gmail.com";

// 🔐 AUTH CHECK
onAuthStateChanged(auth, (user) => {

  if (!user || user.email !== adminEmail) {
    alert("Access denied");
    window.location.href = "index.html";
    return;
  }

  loadDashboard();
});

// 🔥 LOAD DATA
async function loadDashboard(){

  let usersCount = 0;
  let emailsCount = 0;
  let analyzerCount = 0;

  const container = document.getElementById("user-list");

  const querySnapshot = await getDocs(collection(db, "users"));

  querySnapshot.forEach((doc) => {

    const data = doc.data();

    usersCount++;

    if(data.email){
      emailsCount++;
    }

    if(data.analyzerUsed){
      analyzerCount++;
    }

    // 👇 USER CARD
    const div = document.createElement("div");
    div.classList.add("user");

    div.innerHTML = `
      <p><strong>Email:</strong> ${data.email || "N/A"}</p>
      <p><strong>Progress:</strong> ${data.progress || 0}</p>
      <p><strong>Last Page:</strong> ${data.lastPage || "N/A"}</p>
      <p><strong>Analyzer Used:</strong> ${data.analyzerUsed ? "Yes" : "No"}</p>
    `;

    container.appendChild(div);

  });

  // 🔥 UPDATE UI
  document.getElementById("users").innerText = usersCount;
  document.getElementById("emails").innerText = emailsCount;
  document.getElementById("analyzer").innerText = analyzerCount;

}

</script>

</body>
</html>
