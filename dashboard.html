<script>

// ---------------------- Modules ----------------------
const modules = [
  {title:"Foundation of True Learning", lessons:['<a href="YOUTUBE_LINK_1" target="_blank">Video Lesson 1</a>','<a href="exercise1.html" target="_blank">Exercise 1</a>','<a href="reflection1.html" target="_blank">Reflection 1</a>','<a href="PDF_LINK_1" target="_blank">Module 1 PDF</a>']},
  {title:"Cognitive Control & Focus", lessons:['<a href="YOUTUBE_LINK_2" target="_blank">Video Lesson 2</a>','<a href="exercise2.html" target="_blank">Exercise 2</a>','<a href="reflection2.html" target="_blank">Reflection 2</a>','<a href="PDF_LINK_2" target="_blank">Module 2 PDF</a>']},
  {title:"Structured Thinking System", lessons:['<a href="YOUTUBE_LINK_3" target="_blank">Video Lesson 3</a>','<a href="exercise3.html" target="_blank">Exercise 3</a>','<a href="reflection3.html" target="_blank">Reflection 3</a>','<a href="PDF_LINK_3" target="_blank">Module 3 PDF</a>']},
  {title:"AI Integration Fundamentals", lessons:['<a href="YOUTUBE_LINK_4" target="_blank">Video Lesson 4</a>','<a href="exercise4.html" target="_blank">Exercise 4</a>','<a href="reflection4.html" target="_blank">Reflection 4</a>','<a href="PDF_LINK_4" target="_blank">Module 4 PDF</a>']},
  {title:"Deep Work & Execution System", lessons:['<a href="YOUTUBE_LINK_5" target="_blank">Video Lesson 5</a>','<a href="exercise5.html" target="_blank">Exercise 5</a>','<a href="reflection5.html" target="_blank">Reflection 5</a>','<a href="PDF_LINK_5" target="_blank">Module 5 PDF</a>']},
  {title:"Success Map System", lessons:['<a href="YOUTUBE_LINK_6" target="_blank">Video Lesson 6</a>','<a href="exercise6.html" target="_blank">Exercise 6</a>','<a href="reflection6.html" target="_blank">Reflection 6</a>','<a href="PDF_LINK_6" target="_blank">Module 6 PDF</a>']},
  {title:"Performance Optimization", lessons:['<a href="YOUTUBE_LINK_7" target="_blank">Video Lesson 7</a>','<a href="exercise7.html" target="_blank">Exercise 7</a>','<a href="reflection7.html" target="_blank">Reflection 7</a>','<a href="PDF_LINK_7" target="_blank">Module 7 PDF</a>']},
  {title:"Anti-Regression System", lessons:['<a href="YOUTUBE_LINK_8" target="_blank">Video Lesson 8</a>','<a href="exercise8.html" target="_blank">Exercise 8</a>','<a href="reflection8.html" target="_blank">Reflection 8</a>','<a href="PDF_LINK_8" target="_blank">Module 8 PDF</a>']},
  {title:"Advanced Hybrid Intelligence", lessons:['<a href="YOUTUBE_LINK_9" target="_blank">Video Lesson 9</a>','<a href="exercise9.html" target="_blank">Exercise 9</a>','<a href="reflection9.html" target="_blank">Reflection 9</a>','<a href="PDF_LINK_9" target="_blank">Module 9 PDF</a>']},
  {title:"Hidden Mastery Secrets", lessons:['<a href="YOUTUBE_LINK_10" target="_blank">Video Lesson 10</a>','<a href="exercise10.html" target="_blank">Exercise 10</a>','<a href="reflection10.html" target="_blank">Reflection 10</a>','<a href="PDF_LINK_10" target="_blank">Module 10 PDF</a>']},
  {title:"Bonus: Personalized Coaching System", lessons:['<a href="YOUTUBE_LINK_11" target="_blank">Video Lesson 11</a>','<a href="exercise11.html" target="_blank">Exercise 11</a>','<a href="reflection11.html" target="_blank">Reflection 11</a>','<a href="PDF_LINK_11" target="_blank">Bonus PDF</a>']}
];

// ---------------------- Unique Admin Codes ----------------------
let validCodes = ["HYBRID-001","HYBRID-002","HYBRID-003","HYBRID-004","HYBRID-005",
"HYBRID-006","HYBRID-007","HYBRID-008","HYBRID-009","HYBRID-010",
"HYBRID-011","HYBRID-012","HYBRID-013","HYBRID-014","HYBRID-015",
"HYBRID-016","HYBRID-017","HYBRID-018","HYBRID-019","HYBRID-020",
"HYBRID-021","HYBRID-022","HYBRID-023","HYBRID-024","HYBRID-025",
"HYBRID-026","HYBRID-027","HYBRID-028","HYBRID-029","HYBRID-030",
"HYBRID-031","HYBRID-032","HYBRID-033","HYBRID-034","HYBRID-035",
"HYBRID-036","HYBRID-037","HYBRID-038","HYBRID-039","HYBRID-040",
"HYBRID-041","HYBRID-042","HYBRID-043","HYBRID-044","HYBRID-045",
"HYBRID-046","HYBRID-047","HYBRID-048","HYBRID-049","HYBRID-050"];

let container = document.getElementById("modules");
let unlockBtn = document.getElementById("unlock-btn");
let adminInput = document.getElementById("admin-code");
let unlockMsg = document.getElementById("unlock-message");
let paywall = document.getElementById("paywall");

let unlocked = false;
let progress = 0;

// ---------------------- Render Modules ----------------------
function renderModules(){
  container.innerHTML="";
  modules.forEach((mod,index)=>{
    const div = document.createElement("div");
    div.className="module";
    if(!unlocked && index>0){ div.classList.add("locked"); }

    const title = document.createElement("h3");
    title.innerText="Module "+(index+1)+" — "+mod.title;
    div.appendChild(title);

    if(unlocked || index===0){
      mod.lessons.forEach(l=>{
        const lesson = document.createElement("div");
        lesson.className="lesson";
        lesson.innerHTML=l;
        div.appendChild(lesson);
      });

      const btn = document.createElement("button");
      if(index===progress){
        btn.innerText="Complete Module";
        btn.onclick=async ()=>{
          progress++;
          localStorage.setItem("progress",progress);
          const user = auth.currentUser;
          if(user){
            await db.collection("users").doc(user.uid).set({progress},{merge:true});
          }
          renderModules();
        };
      }else if(index<progress){
        btn.innerText="Completed";
        btn.disabled=true;
      }else{
        btn.innerText="Locked";
        btn.disabled=true;
      }
      div.appendChild(btn);
    }
    container.appendChild(div);
  });
}

// ---------------------- Load User Paid Status ----------------------
auth.onAuthStateChanged(async user=>{
  if(user){
    const docRef = db.collection("users").doc(user.uid);
    const docSnap = await docRef.get();
    if(docSnap.exists){
      unlocked = docSnap.data().paid || false;
      progress = docSnap.data().progress || 0;
    } else {
      // Initialize new user in Firestore
      await docRef.set({paid:false, progress:0});
    }
    if(unlocked){ paywall.style.display="none"; }
    renderModules();
  } else {
    // No user logged in, redirect to login page if needed
    console.log("No user logged in");
  }
});

// ---------------------- PayPal Unlock ----------------------
paypal.HostedButtons({
  hostedButtonId: "APGW4MJDHM7K2",
  onApprove: async function(data, actions){
    const user = auth.currentUser;
    if(user){
      unlocked = true;
      localStorage.setItem("unlocked",true);
      paywall.style.display="none";
      await db.collection("users").doc(user.uid).set({paid:true},{merge:true});
      renderModules();
    }
  }
}).render("#paypal-container-APGW4MJDHM7K2");

// ---------------------- Admin Manual Unlock ----------------------
unlockBtn.onclick = async function(){
  let code = adminInput.value.trim().toUpperCase();
  if(validCodes.includes(code)){
    unlocked = true;
    localStorage.setItem("unlocked",true);
    paywall.style.display="none";
    unlockMsg.innerText="Modules unlocked successfully!";

    const user = auth.currentUser;
    if(user){
      await db.collection("users").doc(user.uid).set({paid:true},{merge:true});
    }

    validCodes = validCodes.filter(c => c!==code);
    renderModules();
  } else {
    unlockMsg.innerText="Invalid code! Make sure you type HYBRID-001 format.";
  }
};
</script>
