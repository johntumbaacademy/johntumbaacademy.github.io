<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard — Top Student Academy</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#03050d;
  color:white;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:30px;
}
h1{text-align:center;margin-bottom:30px;}
.module{
  background:#11172b;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}
.locked{
  display:none;
}
.lesson{
  margin-top:10px;
  padding:10px;
  background:#1a2140;
  border-radius:8px;
}
button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#ffce00;
  font-weight:bold;
  cursor:pointer;
}
button:disabled{background:#555;}

.paywall{
  text-align:center;
  margin-top:50px;
}
.paywall a{
  display:block;
  margin-top:15px;
  padding:15px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  color:white;
}
.paywall .whatsapp{background:#25D366;}

.unlock-section{
  text-align:center;
  margin-top:30px;
}
</style>
</head>

<body>
<div class="container">
<h1>Hybrid Intelligence System</h1>

<div id="modules"></div>

<div class="paywall" id="paywall">
  <h2>Unlock Full System</h2>
  <p>Access all modules.</p>

  <a href="https://wa.me/260779483121?text=Hello%20I%20have%20paid%20for%20Hybrid%20System%20-%20Email:%20" class="whatsapp">
    Pay via WhatsApp / Mobile Money
  </a>
</div>

<div class="unlock-section">
  <input type="password" id="admin-code" placeholder="Admin Code">
  <button id="unlock-btn">Unlock</button>
  <p id="unlock-message"></p>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
// ---------------- FIREBASE ----------------
const firebaseConfig = {
  apiKey: "AIzaSyBTbmzwfFafPpb6VJfOiAQILxxswqqHnSs",
  authDomain: "alignment-tsa-library.firebaseapp.com",
  projectId: "alignment-tsa-library",
  storageBucket: "alignment-tsa-library.appspot.com",
  messagingSenderId: "242093533709",
  appId: "1:242093533709:web:aba2715a343e168f844344"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ---------------- MODULES (RESTORED FULL 11) ----------------
const modules = [
  {title:"Foundation of True Learning", lessons:["YOUTUBE_LINK_1","exercise1.html","reflection1.html","PDF_LINK_1"]},
  {title:"Cognitive Control & Focus", lessons:["YOUTUBE_LINK_2","exercise2.html","reflection2.html","PDF_LINK_2"]},
  {title:"Structured Thinking System", lessons:["YOUTUBE_LINK_3","exercise3.html","reflection3.html","PDF_LINK_3"]},
  {title:"AI Integration Fundamentals", lessons:["YOUTUBE_LINK_4","exercise4.html","reflection4.html","PDF_LINK_4"]},
  {title:"Deep Work & Execution System", lessons:["YOUTUBE_LINK_5","exercise5.html","reflection5.html","PDF_LINK_5"]},
  {title:"Success Map System", lessons:["YOUTUBE_LINK_6","exercise6.html","reflection6.html","PDF_LINK_6"]},
  {title:"Performance Optimization", lessons:["YOUTUBE_LINK_7","exercise7.html","reflection7.html","PDF_LINK_7"]},
  {title:"Anti-Regression System", lessons:["YOUTUBE_LINK_8","exercise8.html","reflection8.html","PDF_LINK_8"]},
  {title:"Advanced Hybrid Intelligence", lessons:["YOUTUBE_LINK_9","exercise9.html","reflection9.html","PDF_LINK_9"]},
  {title:"Hidden Mastery Secrets", lessons:["YOUTUBE_LINK_10","exercise10.html","reflection10.html","PDF_LINK_10"]},
  {title:"Bonus: Personalized Coaching System", lessons:["YOUTUBE_LINK_11","exercise11.html","reflection11.html","PDF_LINK_11"]}
];

let unlocked = false;
let progress = 0;

const container = document.getElementById("modules");
const paywall = document.getElementById("paywall");

// ---------------- RENDER ----------------
function renderModules(){
  container.innerHTML="";

  modules.forEach((mod,index)=>{
    const div = document.createElement("div");

    if(!unlocked){
      div.className="module locked";
      container.appendChild(div);
      return;
    }

    div.className="module";

    const title = document.createElement("h3");
    title.innerText = "Module "+(index+1)+" — "+mod.title;
    div.appendChild(title);

    mod.lessons.forEach(link=>{
      const lesson = document.createElement("div");
      lesson.className="lesson";

      const a = document.createElement("a");
      a.href = link;
      a.target = "_blank";
      a.innerText = "Open Lesson";

      lesson.appendChild(a);
      div.appendChild(lesson);
    });

    const btn = document.createElement("button");

    if(index === progress){
      btn.innerText = "Complete Module";
      btn.onclick = async ()=>{
        progress++;

        const user = auth.currentUser;
        if(user){
          await db.collection("users").doc(user.uid).set({
            progress: progress
          },{merge:true});
        }

        renderModules();
      };
    } 
    else if(index < progress){
      btn.innerText="Completed";
      btn.disabled=true;
    } 
    else{
      btn.innerText="Locked";
      btn.disabled=true;
    }

    div.appendChild(btn);
    container.appendChild(div);
  });
}

// ---------------- AUTH (FINAL FIXED) ----------------
auth.onAuthStateChanged(async user=>{
  if(user === null){
    setTimeout(()=>{
      if(auth.currentUser === null){
        window.location.href = "index.html";
      }
    },2000);
    return;
  }

  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();

  if(!snap.exists){
    await ref.set({
      paid:false,
      progress:0
    });
  }

  const data = (await ref.get()).data();

  unlocked = data.paid || false;
  progress = data.progress || 0;

  if(unlocked){
    paywall.style.display="none";
  }

  renderModules();
});

// ---------------- ADMIN UNLOCK ----------------
const validCodes = ["MASTER-KEY-001"];

document.getElementById("unlock-btn").onclick = async ()=>{
  const code = document.getElementById("admin-code").value;

  if(!validCodes.includes(code)){
    document.getElementById("unlock-message").innerText="Invalid";
    return;
  }

  const user = auth.currentUser;
  if(!user) return;

  await db.collection("users").doc(user.uid).set({
    paid:true
  },{merge:true});

  unlocked = true;
  paywall.style.display="none";
  document.getElementById("unlock-message").innerText="Unlocked";

  renderModules();
};
</script>
</body>
</html>
