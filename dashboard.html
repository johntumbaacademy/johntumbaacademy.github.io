<div class="container">

  hostedButtonId: "APGW4MJDHM7K2",

<script>

const modules = [
{
title:"Learning Breakdown",
lessons:["Video Lesson","Exercise","Reflection"]
},
{
title:"Cognitive Control",
lessons:["Video Lesson","Exercise","Reflection"]
},
{
title:"Structured Thinking",
lessons:["Video Lesson","Exercise","Reflection"]
},
{
title:"AI Control",
lessons:["Video Lesson","Exercise","Reflection"]
},
{
title:"Execution System",
lessons:["Video Lesson","Exercise","Reflection"]
},
{
title:"Success Mapping",
lessons:["Video Lesson","Exercise","Reflection"]
},
{
title:"Performance Engine",
lessons:["Video Lesson","Exercise","Reflection"]
},
{
title:"Anti-Regression System",
lessons:["Video Lesson","Exercise","Reflection"]
},
{
title:"Advanced Hybrid Thinking",
lessons:["Video Lesson","Exercise","Reflection"]
},
{
title:"Mastery Layer",
lessons:["Video Lesson","Exercise","Reflection"]
},
{
title:"Bonus: Personal Optimization",
lessons:["Video Lesson","Exercise","Reflection"]
}
];

let unlocked = localStorage.getItem("paid") === "true";
let progress = JSON.parse(localStorage.getItem("progress")) || 0;

const container = document.getElementById("modules");
const paywall = document.getElementById("paywall");

if(unlocked){
  paywall.style.display="none";
}

function render(){
  container.innerHTML="";

  modules.forEach((mod,index)=>{
    const div = document.createElement("div");
    div.className="module";

    if(!unlocked && index>0){
      div.classList.add("locked");
    }

    const title = document.createElement("h3");
    title.innerText="Module "+(index+1)+" — "+mod.title;

    div.appendChild(title);

    if(unlocked || index===0){
      mod.lessons.forEach(l=>{
        const lesson = document.createElement("div");
        lesson.className="lesson";
        lesson.innerText=l;
        div.appendChild(lesson);
      });

      const btn = document.createElement("button");

      if(index===progress){
        btn.innerText="Complete Module";
        btn.onclick=()=>{
          progress++;
          localStorage.setItem("progress",progress);
          render();
        };
      }else if(index<progress){
        btn.innerText="Completed";
        btn.disabled=true;
      }else{
        btn.innerText="Locked";
        btn.disabled=true;
      }

      div.appendChild(btn);
    }

    container.appendChild(div);
  });
}

render();

</script>
