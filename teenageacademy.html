<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Alignment Youth Academy™ — Every Child Deserves to Be Understood</title>
<meta name="description" content="Human Alignment Youth Academy is a premium youth development institution helping young people 0–20 become aligned, character-driven human beings through the Human Alignment Screening™.">

<!-- ============================================================
     FONTS — Fraunces (display serif) + Inter (body sans)
============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   1. DESIGN TOKENS
============================================================ */
:root{
  --navy:        #14213D;
  --navy-light:  #233A66;
  --ivory:       #FAF7F1;
  --ivory-warm:  #F1E9DA;
  --gold:        #AD8A53;
  --gold-light:  #D8BD8C;
  --charcoal:    #2A2A26;
  --charcoal-60: rgba(42,42,38,0.62);
  --line:        #E3DAC6;
  --line-dark:   rgba(250,247,241,0.16);
  --white:       #FFFFFF;

  --font-display: 'Fraunces', Georgia, serif;
  --font-body:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

  --maxw: 1200px;
  --radius: 2px;
  --ease: cubic-bezier(.4,0,.2,1);
}

/* ============================================================
   2. RESET & BASE
============================================================ */
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
@media (prefers-reduced-motion: reduce){
  html{ scroll-behavior:auto; }
  *,*::before,*::after{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; scroll-behavior:auto !important; }
}
body{
  font-family:var(--font-body);
  color:var(--charcoal);
  background:var(--ivory);
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
img,svg{ display:block; max-width:100%; }
a{ color:inherit; text-decoration:none; }
ul{ list-style:none; }
button{ font:inherit; cursor:pointer; border:none; background:none; color:inherit; }
h1,h2,h3,h4{ font-family:var(--font-display); font-weight:600; line-height:1.15; letter-spacing:-0.01em; color:var(--navy); }
:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }

.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 32px; }
.eyebrow{
  display:inline-flex; align-items:center; gap:10px;
  font-size:12.5px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--gold); font-weight:600; margin-bottom:18px;
}
.eyebrow::before{ content:""; width:28px; height:1px; background:var(--gold); }

.section-head{ max-width:680px; margin-bottom:56px; }
.section-head.center{ margin-left:auto; margin-right:auto; text-align:center; }
.section-head h2{ font-size:clamp(28px,4vw,42px); }
.section-head p{ margin-top:18px; font-size:17px; color:var(--charcoal-60); }

section{ padding:108px 0; position:relative; }
@media (max-width:768px){ section{ padding:76px 0; } }

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:10px;
  padding:16px 34px; font-size:14.5px; font-weight:600; letter-spacing:0.03em;
  border-radius:var(--radius); transition:all .35s var(--ease); white-space:nowrap;
  border:1px solid transparent;
}
.btn-primary{ background:var(--gold); color:var(--navy); }
.btn-primary:hover{ background:var(--gold-light); transform:translateY(-2px); box-shadow:0 14px 28px -10px rgba(173,138,83,.55); }
.btn-ghost{ border-color:var(--line-dark); color:var(--ivory); }
.btn-ghost:hover{ border-color:var(--gold); color:var(--gold); }
.btn-outline{ border-color:var(--navy); color:var(--navy); }
.btn-outline:hover{ background:var(--navy); color:var(--ivory); }

/* reveal-on-scroll */
.reveal{ opacity:0; transform:translateY(28px); transition:opacity .8s var(--ease), transform .8s var(--ease); }
.reveal.in-view{ opacity:1; transform:translateY(0); }
.reveal-stagger > *{ transition-delay:calc(var(--i, 0) * 90ms); }

/* ============================================================
   3. HEADER / NAV
============================================================ */
.site-header{
  position:fixed; top:0; left:0; right:0; z-index:1000;
  background:rgba(20,33,61,0);
  border-bottom:1px solid transparent;
  transition:background .4s var(--ease), border-color .4s var(--ease), padding .3s var(--ease);
  padding:26px 0;
}
.site-header.scrolled{
  background:rgba(20,33,61,0.96);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line-dark);
  padding:16px 0;
}
.site-header .wrap{ display:flex; align-items:center; justify-content:space-between; gap:24px; }

.brand{ display:flex; align-items:center; gap:12px; }
.brand-mark{ width:38px; height:38px; flex-shrink:0; }
.brand-name{ color:var(--ivory); font-family:var(--font-display); font-size:16.5px; line-height:1.2; }
.brand-name strong{ display:block; font-weight:600; letter-spacing:0.02em; }
.brand-name span{ display:block; font-size:10px; letter-spacing:0.2em; color:var(--gold-light); text-transform:uppercase; margin-top:2px; }

.nav-links{ display:flex; align-items:center; gap:36px; }
.nav-links a{
  color:var(--ivory); font-size:13.5px; font-weight:500; letter-spacing:0.02em;
  opacity:.82; transition:opacity .25s; position:relative;
}
.nav-links a:hover{ opacity:1; }
.nav-cta{ display:flex; align-items:center; gap:18px; }
.nav-toggle{ display:none; }

@media (max-width:980px){
  .nav-links{
    position:fixed; inset:0 0 0 auto; width:min(78vw,340px); height:100vh;
    background:var(--navy); flex-direction:column; align-items:flex-start; justify-content:center;
    gap:30px; padding:40px; transform:translateX(100%); transition:transform .45s var(--ease);
    box-shadow:-20px 0 60px rgba(0,0,0,.25);
  }
  .nav-links.open{ transform:translateX(0); }
  .nav-links a{ font-size:18px; }
  .nav-toggle{
    display:flex; flex-direction:column; gap:5px; width:30px; z-index:1100;
  }
  .nav-toggle span{ height:2px; background:var(--ivory); width:100%; transition:all .3s var(--ease); }
  .nav-toggle.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
  .nav-toggle.open span:nth-child(2){ opacity:0; }
  .nav-toggle.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }
  .nav-cta .btn-ghost{ display:none; }
}

/* ============================================================
   4. HERO
============================================================ */
.hero{
  position:relative; min-height:100vh; display:flex; align-items:center;
  background:var(--navy); color:var(--ivory); overflow:hidden;
  padding-top:140px; padding-bottom:80px;
}
.hero-lines{ position:absolute; inset:0; opacity:.5; pointer-events:none; }
.hero-lines svg{ width:100%; height:100%; }
.hero-glow{
  position:absolute; top:-20%; right:-10%; width:60vw; height:60vw; max-width:760px; max-height:760px;
  background:radial-gradient(circle, rgba(173,138,83,0.16) 0%, rgba(173,138,83,0) 70%);
  pointer-events:none;
}
.hero .wrap{ position:relative; z-index:2; display:grid; grid-template-columns:1.15fr 0.85fr; gap:60px; align-items:center; }
.hero-copy h1{
  font-size:clamp(38px,5.4vw,64px); color:var(--ivory); font-weight:500;
}
.hero-copy h1 em{ font-style:italic; color:var(--gold-light); font-weight:400; }
.hero-copy .lede{
  margin-top:26px; font-size:18px; color:rgba(250,247,241,0.78); max-width:520px; line-height:1.7;
}
.hero-actions{ margin-top:42px; display:flex; gap:18px; flex-wrap:wrap; }
.hero-stats{ margin-top:64px; display:flex; gap:44px; flex-wrap:wrap; }
.hero-stats div{ border-left:1px solid var(--line-dark); padding-left:18px; }
.hero-stats strong{ display:block; font-family:var(--font-display); font-size:26px; color:var(--gold-light); font-weight:500; }
.hero-stats span{ font-size:12.5px; color:rgba(250,247,241,0.6); letter-spacing:.03em; }

/* hero emblem panel */
.hero-emblem{ position:relative; display:flex; align-items:center; justify-content:center; }
.emblem-ring{
  position:relative; width:min(380px,90%); aspect-ratio:1; border-radius:50%;
  border:1px solid var(--line-dark); display:flex; align-items:center; justify-content:center;
}
.emblem-ring::before{
  content:""; position:absolute; inset:22px; border-radius:50%; border:1px solid rgba(216,189,140,0.35);
  animation:spin 90s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.emblem-center{ text-align:center; }
.emblem-center svg{ width:64px; height:64px; margin:0 auto 14px; }
.emblem-center span{ display:block; font-size:11px; letter-spacing:.25em; color:var(--gold-light); text-transform:uppercase; }
.emblem-dot{ position:absolute; width:7px; height:7px; border-radius:50%; background:var(--gold-light); }

@media (max-width:980px){
  .hero .wrap{ grid-template-columns:1fr; }
  .hero-emblem{ display:none; }
}

.scroll-cue{
  position:absolute; bottom:34px; left:50%; transform:translateX(-50%); z-index:2;
  display:flex; flex-direction:column; align-items:center; gap:10px; color:rgba(250,247,241,0.55); font-size:11px; letter-spacing:.2em; text-transform:uppercase;
}
.scroll-cue .line{ width:1px; height:36px; background:linear-gradient(var(--gold-light), transparent); animation:scrolldown 2s ease-in-out infinite; }
@keyframes scrolldown{ 0%{ opacity:0; transform:scaleY(0); transform-origin:top;} 50%{opacity:1; transform:scaleY(1); transform-origin:top;} 100%{opacity:0; transform:scaleY(1); transform-origin:bottom;} }

/* ============================================================
   5. WHY ALIGNMENT MATTERS
============================================================ */
.matters{ background:var(--ivory); }
.matters-grid{ display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:start; }
.matters-text p{ font-size:17px; color:var(--charcoal-60); margin-bottom:18px; }
.matters-text p strong{ color:var(--navy); font-weight:600; }

.signals{ display:grid; gap:18px; }
.signal-card{
  background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
  padding:24px 26px; display:flex; gap:18px; align-items:flex-start;
  transition:transform .35s var(--ease), box-shadow .35s var(--ease);
}
.signal-card:hover{ transform:translateY(-4px); box-shadow:0 20px 40px -22px rgba(20,33,61,.25); }
.signal-card .num{ font-family:var(--font-display); font-size:15px; color:var(--gold); border:1px solid var(--gold-light); border-radius:50%; width:34px; height:34px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.signal-card h4{ font-size:16px; margin-bottom:6px; }
.signal-card p{ font-size:14.5px; color:var(--charcoal-60); }

@media (max-width:900px){ .matters-grid{ grid-template-columns:1fr; gap:40px; } }

/* ============================================================
   6. PHILOSOPHY
============================================================ */
.philosophy{ background:var(--navy); color:var(--ivory); }
.philosophy .section-head h2, .philosophy .section-head p{ color:var(--ivory); }
.philosophy .section-head p{ color:rgba(250,247,241,0.7); }
.question-pair{ display:grid; grid-template-columns:1fr auto 1fr; gap:36px; align-items:center; margin:50px 0 60px; }
.question-card{ padding:38px 34px; border-radius:var(--radius); }
.question-card.old{ background:rgba(255,255,255,0.03); border:1px solid var(--line-dark); }
.question-card.new{ background:rgba(216,189,140,0.08); border:1px solid rgba(216,189,140,0.4); }
.question-card .label{ font-size:11.5px; letter-spacing:.18em; text-transform:uppercase; color:rgba(250,247,241,0.5); margin-bottom:16px; display:block; }
.question-card.new .label{ color:var(--gold-light); }
.question-card q{ font-family:var(--font-display); font-style:italic; font-size:clamp(19px,2.4vw,25px); line-height:1.45; quotes:none; display:block; }
.q-divider{ font-family:var(--font-display); font-style:italic; font-size:15px; color:var(--gold-light); text-align:center; }
@media (max-width:820px){ .question-pair{ grid-template-columns:1fr; } .q-divider{ display:none; } }

.philosophy-list{ display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line-dark); border:1px solid var(--line-dark); margin-top:10px; }
.philosophy-list li{ background:var(--navy); padding:30px 26px; font-size:14.5px; color:rgba(250,247,241,0.8); line-height:1.6; }
.philosophy-list li b{ display:block; color:var(--gold-light); font-family:var(--font-display); font-style:italic; font-size:16px; margin-bottom:10px; }
@media (max-width:900px){ .philosophy-list{ grid-template-columns:1fr 1fr; } }
@media (max-width:560px){ .philosophy-list{ grid-template-columns:1fr; } }

.closing-line{ margin-top:60px; text-align:center; }
.closing-line p{
  font-family:var(--font-display); font-style:italic; font-weight:400;
  font-size:clamp(22px,3vw,32px); color:var(--ivory); max-width:780px; margin:0 auto; line-height:1.5;
}
.closing-line p::before, .closing-line p::after{ content:'"'; color:var(--gold-light); }

/* ============================================================
   7. NINE DIMENSIONS — signature wheel
============================================================ */
.dimensions{ background:var(--ivory-warm); }
.wheel-layout{ display:grid; grid-template-columns:560px 1fr; gap:60px; align-items:center; }
@media (max-width:1024px){ .wheel-layout{ grid-template-columns:1fr; } }

.wheel-stage{ position:relative; width:100%; max-width:560px; aspect-ratio:1; margin:0 auto; }
.wheel-ring{
  position:absolute; inset:0; border-radius:50%; border:1px dashed var(--line);
}
.wheel-ring.inner{ inset:17%; border:1px solid var(--line); }
.wheel-center{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:34%; aspect-ratio:1; border-radius:50%; background:var(--navy);
  display:flex; align-items:center; justify-content:center; text-align:center; padding:12px;
  box-shadow:0 30px 60px -25px rgba(20,33,61,.45);
}
.wheel-center span{ font-family:var(--font-display); font-style:italic; color:var(--ivory); font-size:clamp(13px,1.6vw,16px); line-height:1.35; }

.wheel-node{
  position:absolute; width:148px; margin-left:-74px; margin-top:-34px;
  text-align:center; cursor:pointer;
}
.wheel-node .dot{
  width:13px; height:13px; border-radius:50%; background:var(--white); border:2px solid var(--gold);
  margin:0 auto 10px; transition:all .3s var(--ease);
}
.wheel-node .lbl{
  font-size:12.5px; font-weight:600; color:var(--navy); letter-spacing:.01em;
  background:var(--ivory-warm); padding:2px 6px; border-radius:2px;
}
.wheel-node:hover .dot, .wheel-node.active .dot{ background:var(--gold); transform:scale(1.3); }
.wheel-node:hover .lbl, .wheel-node.active .lbl{ color:var(--gold); }

.dim-detail{ }
.dim-detail-card{
  background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:34px 36px;
  min-height:200px; display:flex; flex-direction:column; justify-content:center;
}
.dim-detail-card .tag{ font-size:11.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
.dim-detail-card h3{ font-size:24px; margin-bottom:14px; }
.dim-detail-card p{ color:var(--charcoal-60); font-size:15.5px; }

.dim-grid-mobile{ display:none; margin-top:36px; gap:14px; grid-template-columns:1fr 1fr; }
.dim-chip{ background:var(--white); border:1px solid var(--line); padding:16px 18px; font-size:13.5px; font-weight:600; color:var(--navy); border-radius:var(--radius); }
@media (max-width:1024px){
  .wheel-stage{ display:none; }
  .dim-grid-mobile{ display:grid; }
}

/* ============================================================
   8. PROCESS
============================================================ */
.process{ background:var(--ivory); }
.process-steps{ position:relative; }
.process-steps::before{
  content:""; position:absolute; left:27px; top:14px; bottom:14px; width:1px;
  background:linear-gradient(var(--line), var(--line) 90%, transparent);
}
@media (max-width:700px){ .process-steps::before{ left:21px; } }
.step{ position:relative; display:grid; grid-template-columns:56px 1fr; gap:28px; padding-bottom:52px; }
.step:last-child{ padding-bottom:0; }
.step-num{
  width:56px; height:56px; border-radius:50%; background:var(--navy); color:var(--gold-light);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:19px;
  position:relative; z-index:1; flex-shrink:0;
}
@media (max-width:700px){ .step-num{ width:44px; height:44px; font-size:16px; } .step{ grid-template-columns:44px 1fr; gap:20px; } }
.step-body h3{ font-size:20px; margin-bottom:8px; }
.step-body p{ color:var(--charcoal-60); font-size:15.5px; max-width:640px; }

/* ============================================================
   9. AGE PATHWAYS
============================================================ */
.pathways{ background:var(--navy); color:var(--ivory); }
.pathways .section-head h2, .pathways .section-head p{ color:var(--ivory); }
.pathways .section-head p{ color:rgba(250,247,241,.7); }
.pathway-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:22px; }
@media (max-width:1024px){ .pathway-grid{ grid-template-columns:1fr 1fr; } }
@media (max-width:600px){ .pathway-grid{ grid-template-columns:1fr; } }
.pathway-card{
  background:rgba(255,255,255,0.035); border:1px solid var(--line-dark); border-radius:var(--radius);
  padding:34px 26px; transition:all .35s var(--ease);
}
.pathway-card:hover{ background:rgba(216,189,140,0.06); border-color:rgba(216,189,140,.45); transform:translateY(-6px); }
.pathway-card .range{ font-family:var(--font-display); font-style:italic; font-size:30px; color:var(--gold-light); margin-bottom:6px; }
.pathway-card .stage{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:rgba(250,247,241,.55); margin-bottom:18px; }
.pathway-card p{ font-size:14.5px; color:rgba(250,247,241,.78); }
.pathways-note{ margin-top:36px; text-align:center; font-size:14.5px; color:rgba(250,247,241,.6); }
.pathways-note span{ color:var(--gold-light); font-weight:600; }

/* ============================================================
   10. FOUNDER
============================================================ */
.founder{ background:var(--ivory-warm); }
.founder-grid{ display:grid; grid-template-columns:0.8fr 1.2fr; gap:64px; align-items:center; }
@media (max-width:900px){ .founder-grid{ grid-template-columns:1fr; gap:40px; } }
.founder-portrait{
  aspect-ratio:4/5; border-radius:var(--radius); background:linear-gradient(160deg,#dfd3b8,#c9b78c);
  display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
  border:1px solid var(--line);
}
.founder-portrait span{ font-family:var(--font-display); font-style:italic; color:var(--navy); opacity:.55; font-size:15px; text-align:center; padding:20px; }
.founder-credentials{ margin-top:20px; display:flex; flex-direction:column; gap:10px; }
.cred{ display:flex; gap:12px; align-items:flex-start; font-size:14px; color:var(--charcoal-60); }
.cred svg{ width:18px; height:18px; flex-shrink:0; margin-top:2px; color:var(--gold); }
.founder-text h3{ font-size:14px; }
.founder-text .name{ font-size:clamp(26px,3.4vw,34px); margin-bottom:6px; }
.founder-text .title-line{ font-size:14px; color:var(--gold); font-weight:600; letter-spacing:.04em; text-transform:uppercase; margin-bottom:22px; }
.founder-text p{ font-size:16px; color:var(--charcoal-60); margin-bottom:16px; }
.founder-text p strong{ color:var(--navy); }

/* ============================================================
   11. FAQ
============================================================ */
.faq{ background:var(--ivory); }
.faq-list{ max-width:820px; margin:0 auto; border-top:1px
