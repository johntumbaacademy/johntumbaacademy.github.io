<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Human Alignment</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1c1c1c;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 12px;
  background: #ff4c4c;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.toggle {
  margin-top: 10px;
  color: #aaa;
  cursor: pointer;
}

.rules {
  font-size: 12px;
  text-align: left;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2 id="title">Login</h2>

  <input type="email" id="email" placeholder="Email">
  
  <input type="password" id="password" placeholder="Password">
  
  <label style="font-size: 12px;">
    <input type="checkbox" onclick="togglePassword()"> Show Password
  </label>

  <div class="rules" id="passwordRules" style="display:none;">
    <p id="length">❌ At least 8 characters</p>
    <p id="uppercase">❌ Uppercase letter</p>
    <p id="lowercase">❌ Lowercase letter</p>
    <p id="number">❌ Number</p>
    <p id="special">❌ Special character</p>
  </div>

  <button onclick="handleAuth()">Continue</button>

  <p class="toggle" onclick="toggleMode()">Don't have an account? Sign up</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBTbmzwfFafPpb6VJfOiAQILxxswqqHnSs",
  authDomain: "alignment-tsa-library.firebaseapp.com",
  databaseURL: "https://alignment-tsa-library-default-rtdb.firebaseio.com",
  projectId: "alignment-tsa-library",
  storageBucket: "alignment-tsa-library.firebasestorage.app",
  messagingSenderId: "242093533709",
  appId: "1:242093533709:web:24809896167bb472844344"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// AUTO LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    redirectUser(user.uid);
  }
});

// MODE
let isLogin = true;

// TOGGLE LOGIN / SIGNUP
window.toggleMode = function(){
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up";
  document.querySelector(".toggle").innerText = isLogin 
    ? "Don't have an account? Sign up"
    : "Already have an account? Login";

  document.getElementById("passwordRules").style.display = isLogin ? "none" : "block";
};

// SHOW PASSWORD
window.togglePassword = function(){
  const field = document.getElementById("password");
  field.type = field.type === "password" ? "text" : "password";
};

// PASSWORD VALIDATION UI
document.getElementById("password").addEventListener("input", function(){

  const value = this.value;

  document.getElementById("length").innerText =
    value.length >= 8 ? "✅ At least 8 characters" : "❌ At least 8 characters";

  document.getElementById("uppercase").innerText =
    /[A-Z]/.test(value) ? "✅ Uppercase letter" : "❌ Uppercase letter";

  document.getElementById("lowercase").innerText =
    /[a-z]/.test(value) ? "✅ Lowercase letter" : "❌ Lowercase letter";

  document.getElementById("number").innerText =
    /[0-9]/.test(value) ? "✅ Number" : "❌ Number";

  document.getElementById("special").innerText =
    /[!@#$%^&*]/.test(value) ? "✅ Special character" : "❌ Special character";
});

// AUTH
window.handleAuth = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Fill all fields");
    return;
  }

  try{

    if(isLogin){
      // LOGIN
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      redirectUser(userCred.user.uid);

    }else{

      // PASSWORD RULE CHECK (ONLY SIGNUP)
      if(password.length < 8 ||
         !/[A-Z]/.test(password) ||
         !/[a-z]/.test(password) ||
         !/[0-9]/.test(password) ||
         !/[!@#$%^&*]/.test(password)){
        alert("Password does not meet requirements");
        return;
      }

      // SIGNUP
      const userCred = await createUserWithEmailAndPassword(auth, email, password);

      await setDoc(doc(db, "users", userCred.user.uid), {
        email: email,
        hasCourseAccess: false,
        hasLibraryAccess: false,
        analyzerUsed: false,
        progress: 0,
        lastPage: "none",
        createdAt: new Date()
      });

      redirectUser(userCred.user.uid);
    }

  }catch(error){
    alert(error.message);
  }
};

// REDIRECT
async function redirectUser(uid){

  const userDoc = await getDoc(doc(db, "users", uid));

  if(!userDoc.exists()){
    alert("User data missing");
    return;
  }

  window.location.href = "student-dashboard.html";
}

</script>

</body>
</html>
