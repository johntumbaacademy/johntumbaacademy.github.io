<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard — Top Student Academy</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#03050d;
  color:white;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:30px;
}
h1{text-align:center;margin-bottom:30px;}
.module{
  background:#11172b;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}
.locked{
  display:none; /* FULLY HIDDEN */
}
.lesson{
  margin-top:10px;
  padding:10px;
  background:#1a2140;
  border-radius:8px;
}
button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#ffce00;
  font-weight:bold;
  cursor:pointer;
}
button:disabled{background:#555;}

.paywall{
  text-align:center;
  margin-top:50px;
}
.paywall a{
  display:block;
  margin-top:15px;
  padding:15px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  color:white;
}
.paywall .whatsapp{background:#25D366;}

.unlock-section{
  text-align:center;
  margin-top:30px;
}
</style>
</head>

<body>
<div class="container">
<h1>Hybrid Intelligence System</h1>

<div id="modules"></div>

<!-- PAYWALL -->
<div class="paywall" id="paywall">
  <h2>Unlock Full System</h2>
  <p>Access all modules.</p>

  <a href="https://wa.me/260779483121?text=Hello%20I%20have%20paid%20for%20Hybrid%20System%20-%20Email:%20" class="whatsapp">
    Pay via WhatsApp / Mobile Money
  </a>
</div>

<!-- ADMIN BACKDOOR (YOU ONLY) -->
<div class="unlock-section">
  <input type="password" id="admin-code" placeholder="Admin Code">
  <button id="unlock-btn">Unlock</button>
  <p id="unlock-message"></p>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
// ---------------- FIREBASE ----------------
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "alignment-tsa-library.firebaseapp.com",
  projectId: "alignment-tsa-library",
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ---------------- MODULES ----------------
const modules = [
  {title:"Foundation", lessons:["YOUTUBE_LINK_1","exercise1.html"]},
  {title:"Focus", lessons:["YOUTUBE_LINK_2","exercise2.html"]},
  {title:"Thinking", lessons:["YOUTUBE_LINK_3"]},
  {title:"AI", lessons:["YOUTUBE_LINK_4"]},
  {title:"Execution", lessons:["YOUTUBE_LINK_5"]}
];

let unlocked = false;
let progress = 0;

const container = document.getElementById("modules");
const paywall = document.getElementById("paywall");

// ---------------- RENDER ----------------
function renderModules(){
  container.innerHTML="";

  modules.forEach((mod,index)=>{
    const div = document.createElement("div");

    if(!unlocked){
      div.className="module locked";
      container.appendChild(div);
      return;
    }

    div.className="module";

    const title = document.createElement("h3");
    title.innerText = "Module "+(index+1)+" — "+mod.title;
    div.appendChild(title);

    // Lessons
    mod.lessons.forEach(link=>{
      const lesson = document.createElement("div");
      lesson.className="lesson";

      const a = document.createElement("a");
      a.href = link;
      a.target = "_blank";
      a.innerText = "Open Lesson";

      lesson.appendChild(a);
      div.appendChild(lesson);
    });

    // Progress Button
    const btn = document.createElement("button");

    if(index === progress){
      btn.innerText = "Complete Module";
      btn.onclick = async ()=>{
        progress++;

        const user = auth.currentUser;
        if(user){
          await db.collection("users").doc(user.uid).set({
            progress: progress
          },{merge:true});
        }

        renderModules();
      };
    } else if(index < progress){
      btn.innerText="Completed";
      btn.disabled=true;
    } else{
      btn.innerText="Locked";
      btn.disabled=true;
    }

    div.appendChild(btn);
    container.appendChild(div);
  });
}

// ---------------- AUTH CHECK ----------------
auth.onAuthStateChanged(async user=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();

  if(!snap.exists){
    await ref.set({
      paid:false,
      progress:0
    });
  }

  const data = (await ref.get()).data();

  unlocked = data.paid || false;
  progress = data.progress || 0;

  if(unlocked){
    paywall.style.display="none";
  }

  renderModules();
});

// ---------------- ADMIN UNLOCK ----------------
const validCodes = ["MASTER-KEY-001"]; // ONLY YOU KNOW THIS

document.getElementById("unlock-btn").onclick = async ()=>{
  const code = document.getElementById("admin-code").value;

  if(!validCodes.includes(code)){
    document.getElementById("unlock-message").innerText="Invalid";
    return;
  }

  const user = auth.currentUser;
  if(!user) return;

  await db.collection("users").doc(user.uid).set({
    paid:true
  },{merge:true});

  document.getElementById("unlock-message").innerText="Unlocked";

  unlocked = true;
  paywall.style.display="none";

  renderModules();
};
</script>
</body>
</html>
