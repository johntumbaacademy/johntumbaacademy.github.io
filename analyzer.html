<!DOCTYPE html>
<html>
<head>
<title>Relationship Analyzer</title>

<style>
body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

button{
padding:10px 20px;
margin:10px;
background:#ff4c4c;
border:none;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Analyze Your Behavior</h1>

<p>Do you overthink messages?</p>
<button onclick="answer('yes')">Yes</button>
<button onclick="answer('no')">No</button>

<p id="result"></p>

<script>

function answer(a){
if(a==="yes"){
document.getElementById("result").innerText =
"You are reacting emotionally. This reduces leverage.";
}else{
document.getElementById("result").innerText =
"You maintain control. This increases attraction.";
}
}

</script>

</body>
</html>
