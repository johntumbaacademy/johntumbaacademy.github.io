<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Tumba Academy — Elite Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Base styling */
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 4rem 1rem 2rem 1rem;
    }

    header h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: fadeUp 1s ease forwards;
    }

    header p {
      font-size: 1.2rem;
      opacity: 0.8;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    /* Button container */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin: 3rem 0;
      width: 90%;
      max-width: 500px;
    }

    .btn {
      padding: 1rem 2rem;
      font-size: 1.2rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      animation: fadeUp 1s ease forwards;
      opacity: 0;
    }

    .btn-primary { background: linear-gradient(90deg, #00c6ff, #0072ff); color: #fff; }
    .btn-secondary { background: linear-gradient(90deg, #ff7eb3, #ff758c); color: #fff; }
    .btn-tertiary { background: linear-gradient(90deg, #43e97b, #38f9d7); color: #000; }
    .btn-quaternary { background: linear-gradient(90deg, #f7971e, #ffd200); color: #000; }
    .btn-quinary { background: linear-gradient(90deg, #9d50bb, #6e48aa); color: #fff; }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px);}
      100% { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <header>
    <h1>John Tumba Academy</h1>
    <p>Elite Hub — Fitness, Human Performance & Martial Arts Authority</p>
  </header>

  <div class="actions">
    <!-- PDF Landing Page -->
    <a href="pdf-page.html" class="btn btn-primary">Download PDF</a>
    
    <!-- 90-Day Human Performance Restoration -->
    <a href="hprs-page.html" class="btn btn-secondary">90-Day Human Performance Restoration</a>
    
    <!-- MAIU Application -->
    <a href="maiu-application.html" class="btn btn-tertiary">Apply to MAIU</a>
    
    <!-- Book Consultation -->
    <a href="consultation.html" class="btn btn-quaternary">Book Consultation</a>
    
    <!-- MAIU Library -->
    <a href="maiu-library.html" class="btn btn-quinary">Explore MAIU Library</a>
  </div>
</body>
</html>
