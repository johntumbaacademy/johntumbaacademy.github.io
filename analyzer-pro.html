<!DOCTYPE html>
<html>
<head>
<title>Human Alignment Analyzer</title>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}
.container{
max-width:600px;
margin:auto;
background:#1c1c1c;
padding:30px;
border-radius:12px;
}
button{
padding:12px 20px;
margin:10px;
background:#ff4c4c;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
}
.hidden{
display:none;
}
.result{
margin-top:20px;
padding:20px;
background:#111;
border-radius:10px;
text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h1>Human Alignment Analyzer™</h1>

<!-- EMAIL -->
<div id="emailGate">
<p>Enter your email to unlock your psychological analysis</p>

<input type="email" id="emailInput" placeholder="Enter your email"
style="padding:10px;width:80%;border-radius:6px;border:none;">

<br><br>

<button onclick="startAnalyzer()">Start Analysis</button>
</div>

<!-- ANALYZER -->
<div id="analyzer" class="hidden">

<p>Answer honestly. Your pattern will be revealed.</p>

<div id="q1">
<p>When someone pulls away?</p>
<button onclick="answer('chase')">Chase</button>
<button onclick="answer('wait')">Wait</button>
<button onclick="answer('react')">React</button>
</div>

<div id="q2" class="hidden">
<p>Slow replies?</p>
<button onclick="answer('overthink')">Overthink</button>
<button onclick="answer('match')">Match</button>
<button onclick="answer('double')">Double text</button>
</div>

<div id="q3" class="hidden">
<p>Fear losing them?</p>
<button onclick="answer('yes')">Yes</button>
<button onclick="answer('no')">No</button>
</div>

<div id="result" class="result hidden"></div>

</div>

<!-- 🔥 MAIN SCRIPT WITH FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBTbmzwfFafPpb6VJfOiAQILxxswqqHnSs",
  authDomain: "alignment-tsa-library.firebaseapp.com",
  projectId: "alignment-tsa-library",
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GLOBALS
let userEmail = "";
let answers = [];
let finalResult = "";

// START
window.startAnalyzer = function(){

let email = document.getElementById("emailInput").value;

if(!email.includes("@")){
alert("Enter valid email");
return;
}

userEmail = email;
localStorage.setItem("userEmail", email);

document.getElementById("emailGate").classList.add("hidden");
document.getElementById("analyzer").classList.remove("hidden");

};

// ANSWER FLOW
window.answer = function(value){

answers.push(value);

if(answers.length === 1){
document.getElementById("q1").classList.add("hidden");
document.getElementById("q2").classList.remove("hidden");
}
else if(answers.length === 2){
document.getElementById("q2").classList.add("hidden");
document.getElementById("q3").classList.remove("hidden");
}
else{
analyze();
}

};

// ANALYZE
async function analyze(){

let result = "";

if(answers.includes("chase") || answers.includes("double")){

result = `<h2>Over-Investment</h2><p>You give too much attention.</p>`;

finalResult = "Over-Investment: High risk. Stop chasing.";

}
else if(answers.includes("overthink") || answers.includes("yes")){

result = `<h2>Emotional Reactivity</h2><p>You react emotionally.</p>`;

finalResult = "Emotional Reactivity: Control your emotions.";

}
else{

result = `<h2>Controlled Presence</h2><p>You are stable.</p>`;

finalResult = "Controlled Presence: Strong position.";

}

// SHOW
let box = document.getElementById("result");

box.innerHTML = result + `
<br><br>
<button onclick="downloadPDF()">Download Report</button>
`;

box.classList.remove("hidden");

// SAVE
try{

await addDoc(collection(db, "users"), {
email: userEmail,
result: finalResult,
timestamp: new Date()
});

console.log("Saved!");

}catch(e){
console.error("Error:", e);
}

}

// PDF
window.downloadPDF = function(){

const { jsPDF } = window.jspdf;

let doc = new jsPDF();

doc.text(finalResult, 10, 10);
doc.save("report.pdf");

};

</script>

</body>
</html>
