<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: #fff;
}

/* TOP AUTHORITY BAR */
.top-bar {
  text-align: center;
  font-size: 0.85rem;
  letter-spacing: 1px;
  color: #888;
  padding: 15px 10px;
  border-bottom: 1px solid #111;
}

/* HERO */
.hero {
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  flex-direction: column;
}

.hero h1 {
  font-size: 2.8rem;
  opacity: 0;
  transform: translateY(40px);
  animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.hero p {
  color: #aaa;
  margin-top: 20px;
  opacity: 0;
  animation: fadeUp 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* SUB AUTHORITY */
.sub-authority {
  margin-top: 25px;
  font-size: 0.95rem;
  color: #777;
  letter-spacing: 0.5px;
  opacity: 0;
  animation: fadeUp 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* SECTION */
.section {
  padding: 60px 20px 80px;
  max-width: 1000px;
  margin: auto;
  opacity: 0;
  transform: translateY(60px);
  transition: all 1s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* CARD — APPLE LEVEL MICRO INTERACTION */
.card {
  position: relative;
  border: 1px solid #222;
  padding: 30px;
  margin-top: 25px;
  border-radius: 14px;
  background: #111;
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
              box-shadow 0.35s cubic-bezier(0.22, 1, 0.36, 1),
              border-color 0.35s ease;
  overflow: hidden;
}

/* subtle gradient glow layer */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 14px;
  background: radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 60%);
  opacity: 0;
  transition: opacity 0.4s ease;
}

/* hover effect */
.card:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  border-color: #555;
}

.card:hover::before {
  opacity: 1;
}

/* BUTTON — MICRO INTERACTION */
.btn {
  position: relative;
  display: inline-block;
  margin-top: 20px;
  padding: 12px 22px;
  border-radius: 8px;
  border: 1px solid #444;
  color: #fff;
  text-decoration: none;
  background: linear-gradient(90deg, #111, #1a1a1a);
  overflow: hidden;
  transition: all 0.3s ease;
}

/* light sweep effect */
.btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: 0.6s;
}

/* hover */
.btn:hover {
  background: #fff;
  color: #000;
  border-color: #fff;
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

.btn:hover::after {
  left: 100%;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 60px 20px;
  color: #666;
  font-size: 0.9rem;
  border-top: 1px solid #111;
}

/* ANIMATION */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
