<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard — Top Student Academy</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#03050d;color:white;}
.container{max-width:1000px;margin:auto;padding:30px;}
h1{text-align:center;margin-bottom:30px;}
.module{background:#11172b;padding:20px;border-radius:12px;margin-bottom:15px;}
.lesson{margin-top:10px;padding:10px;background:#1a2140;border-radius:8px;}
button{margin-top:10px;padding:10px 15px;border:none;border-radius:8px;background:#ffce00;font-weight:bold;cursor:pointer;}
button:disabled{background:#555;}
.paywall{text-align:center;margin-top:50px;}
.paywall a{display:block;margin-top:15px;padding:15px;border-radius:10px;text-decoration:none;font-weight:bold;color:white;}
.paywall .whatsapp{background:#25D366;}
.unlock-section{text-align:center;margin-top:30px;}
.unlock-section input{padding:10px;border-radius:8px;border:none;margin-right:10px;}
.unlock-section p{color:#ffce00;}
</style>
</head>
<body>
<div class="container">
<h1>Hybrid Intelligence System</h1>
<div id="modules"></div>
<div class="paywall" id="paywall">
  <h2>Unlock Full System</h2>
  <p>Access all modules.</p>
  <a href="https://wa.me/260779483121?text=Hello%20I%20have%20paid%20for%20Hybrid%20System%20-%20Email:%20" class="whatsapp">Pay via WhatsApp / Mobile Money</a>
</div>
<div class="unlock-section">
  <input type="password" id="admin-code" placeholder="Admin Code">
  <button id="unlock-btn">Unlock</button>
  <p id="unlock-message"></p>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
(function(){
  "use strict";

  // ---------------- MODULE DATA OBFUSCATED ----------------
  const _modData = [
    ["Foundation of True Learning","YOUTUBE_LINK_1","exercise1.html","reflection1.html","PDF_LINK_1"],
    ["Cognitive Control & Focus","YOUTUBE_LINK_2","exercise2.html","reflection2.html","PDF_LINK_2"],
    ["Structured Thinking System","YOUTUBE_LINK_3","exercise3.html","reflection3.html","PDF_LINK_3"],
    ["AI Integration Fundamentals","YOUTUBE_LINK_4","exercise4.html","reflection4.html","PDF_LINK_4"],
    ["Deep Work & Execution System","YOUTUBE_LINK_5","exercise5.html","reflection5.html","PDF_LINK_5"],
    ["Success Map System","YOUTUBE_LINK_6","exercise6.html","reflection6.html","PDF_LINK_6"],
    ["Performance Optimization","YOUTUBE_LINK_7","exercise7.html","reflection7.html","PDF_LINK_7"],
    ["Anti-Regression System","YOUTUBE_LINK_8","exercise8.html","reflection8.html","PDF_LINK_8"],
    ["Advanced Hybrid Intelligence","YOUTUBE_LINK_9","exercise9.html","reflection9.html","PDF_LINK_9"],
    ["Hidden Mastery Secrets","YOUTUBE_LINK_10","exercise10.html","reflection10.html","PDF_LINK_10"],
    ["Bonus: Personalized Coaching System","YOUTUBE_LINK_11","exercise11.html","reflection11.html","PDF_LINK_11"]
  ];
  const modules=[];
  _modData.forEach(m=>modules.push({title:m[0],lessons:m.slice(1)}));
  Object.freeze(modules);

  // ---------------- FIREBASE ----------------
  const firebaseConfig={
    apiKey:"AIzaSyBTbmzwfFafPpb6VJfOiAQILxxswqqHnSs",
    authDomain:"alignment-tsa-library.firebaseapp.com",
    projectId:"alignment-tsa-library",
    storageBucket:"alignment-tsa-library.appspot.com",
    messagingSenderId:"242093533709",
    appId:"1:242093533709:web:aba2715a343e168f844344"
  };
  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth();
  const db=firebase.firestore();

  const container=document.getElementById("modules");
  const paywall=document.getElementById("paywall");
  let unlocked=false;
  let progress=0;

  // ---------------- RENDER MODULES ----------------
  function renderModules(progress){
    container.innerHTML="";
    modules.forEach((mod,index)=>{
      const div=document.createElement("div");
      div.className="module";
      if(index>progress) div.classList.add("locked");
      if(index<=progress){
        const title=document.createElement("h3");
        title.innerText="Module "+(index+1)+" — "+mod.title;
        div.appendChild(title);
        mod.lessons.forEach(l=>{
          const lesson=document.createElement("div");
          lesson.className="lesson";
          const a=document.createElement("a");
          a.href=l;
          a.target="_blank";
          a.innerText="Open Lesson";
          lesson.appendChild(a);
          div.appendChild(lesson);
        });
        const btn=document.createElement("button");
        btn.innerText=index===progress?"Complete Module":index<progress?"Completed":"Locked";
        btn.disabled=index!==progress;
        btn.onclick=index===progress?async ()=>{
          const user=auth.currentUser;if(!user)return;
          const newProgress=progress+1;
          await db.collection("users").doc(user.uid).set({progress:newProgress},{merge:true});
        }:null;
        div.appendChild(btn);
      }
      container.appendChild(div);
    });
  }

  // ---------------- ADMIN UNLOCK ----------------
  let validCodes=["MASTER-KEY-001"];
  document.getElementById("unlock-btn").onclick=async()=>{
    const code=document.getElementById("admin-code").value.trim();
    const user=auth.currentUser;if(!user)return;
    if(!validCodes.includes(code)){document.getElementById("unlock-message").innerText="Invalid Code";return;}
    await db.collection("users").doc(user.uid).set({paid:true},{merge:true});
    validCodes=validCodes.filter(c=>c!==code);
    document.getElementById("unlock-message").innerText="Unlocked";
  };

  // ---------------- AUTH + SEMI-AUTO UNLOCK ----------------
  auth.onAuthStateChanged(async user=>{
    if(!user) return window.location.href="index.html";
    const ref=db.collection("users").doc(user.uid);
    const snap=await ref.get();
    if(!snap.exists) await ref.set({paid:false,progress:0});
    renderModules(0);
    ref.onSnapshot(doc=>{
      const data=doc.data();
      if(data.paid && !unlocked){
        unlocked=true;
        paywall.style.display="none";
        renderModules(data.progress||0);
      }
    });
  });

  // ---------------- FINAL PROTECTION ----------------
  document.addEventListener('contextmenu',e=>e.preventDefault());
})();
</script>
</body>
</html>
